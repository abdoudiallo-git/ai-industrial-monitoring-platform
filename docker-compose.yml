version: '3.8'

services:

  # PostgreSQL Database
  db:
    image: postgres:16
    container_name: ai_monitoring_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ai_monitoring
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # FastAPI
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_monitoring_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/ai_monitoring
    depends_on:
      - db

  # Streamlit Dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: ai_monitoring_dashboard
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  postgres_data: